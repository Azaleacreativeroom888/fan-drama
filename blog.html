<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog | The Drama Parlour</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --crimson: #80002b;
      --crimson-dark: #5a001e;
      --crimson-deeper: #3b0013;
      --crimson-light: #a8003a;
      --cream: #f5ede0;
      --cream-dark: #e8d8c0;
      --gold: #b8933a;
      --gold-light: #d4aa55;
      --ink: #1a0a0f;
      --ink-mid: #2e1520;
      --text-body: #3d1f28;
      --text-muted: #7a5060;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--ink);
      color: var(--cream);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(255,255,255,0.012) 2px, rgba(255,255,255,0.012) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(26,10,15,0.97), rgba(26,10,15,0.7));
      border-bottom: 1px solid rgba(184,147,58,0.25);
      padding: 0 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .nav-logo {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      letter-spacing: 0.18em;
      color: var(--gold);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      font-size: 0.78rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--cream-dark);
      text-decoration: none;
      transition: color 0.3s;
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--gold-light); }

    /* PAGE */
    .page {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 7rem 1.5rem 5rem;
    }

    /* PAGE TITLE */
    .page-title {
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.6rem;
    }

    .page-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid rgba(184,147,58,0.2);
    }

    /* POSTS */
    .posts {
      display: flex;
      flex-direction: column;
    }

    .post {
      display: grid;
      grid-template-columns: 90px 1fr;
      gap: 1.5rem;
      padding: 1.2rem 0;
      border-bottom: 1px solid rgba(184,147,58,0.1);
      align-items: baseline;
    }

    .post:first-child {
      border-top: 1px solid rgba(184,147,58,0.1);
    }

    .post-date {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      color: var(--gold);
      padding-top: 0.15rem;
      flex-shrink: 0;
    }

    .post-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      line-height: 1.75;
      color: var(--cream-dark);
    }

    /* FOOTER */
    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid rgba(184,147,58,0.15);
      padding: 2rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2rem;
    }

    footer p {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      color: var(--text-muted);
    }

    footer .footer-logo {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      color: var(--gold);
      opacity: 0.6;
    }

    @media (max-width: 600px) {
      nav { padding: 0 1.2rem; }
      .nav-links { gap: 1.2rem; }
      .page { padding: 6rem 1.2rem 4rem; }
      .post { grid-template-columns: 1fr; gap: 0.3rem; }
      footer { flex-direction: column; gap: 0.8rem; text-align: center; padding: 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-logo" href="index.html">THE DRAMA PARLOUR</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="ranking.html">Ranking</a></li>
      <li><a href="blog.html" class="active">Blog</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <main class="page">

    <p class="page-title">Blog</p>
    <p class="page-subtitle">備忘録。ネタバレを含みます。</p>

    <div class="posts">

      <div class="post">
        <div class="post-date">2026.06.02</div>
        <div class="post-text">LOSTかなり面白い。最高。</div>
      </div>

      <div class="post">
        <div class="post-date">2026.04.21</div>
        <div class="post-text">マーベル作品ちょっとギブアップかもしれない。私には合わなかった。マーベル作品が好きな人の話を聞くのは楽しいんだけどな。</div>
      </div>

    </div>

  </main>

  <footer>
    <p>© The Drama Parlour &nbsp;·&nbsp; All rights reserved</p>
    <div class="footer-logo">THE DRAMA PARLOUR</div>
  </footer>

</body>
</html>
